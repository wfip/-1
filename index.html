<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بلنتياات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            background-image: url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1200');
            background-size: cover;
            background-position: center;
            position: relative;
            border: 4px solid #333;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        #goal-net {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 550px;
            height: 280px;
            border: 10px solid rgba(255, 255, 255, 0.9);
            border-bottom: none;
            background-color: rgba(0, 0, 0, 0.2);
        }

        #goalkeeper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            transition: left 0.3s ease-in-out;
            content: url('https://i.imgur.com/T0bSg1M.png');
        }

        #penalty-ball {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            content: url('https://i.imgur.com/KzK6M0X.png');
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.6));
            transition: all 0.4s ease-out;
        }

        #scoreboard {
            position: absolute;
            top: 0;
            width: 100%;
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
            padding: 20px 0;
        }

        #turn-status {
            font-size: 16px;
            margin-top: 5px;
            font-weight: bold;
            color: #2ecc71;
        }

        /* نافذة آبل أركيد في منتصف الشاشة */
        #arcade-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: rgba(28, 28, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            z-index: 100;
            text-align: center;
            box-sizing: border-box;
        }

        #arcade-header {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 700;
            margin-bottom: 8px;
        }

        #arcade-title {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        #arcade-message {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 24px;
        }

        #popup-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .arcade-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background-color: #ffffff;
            color: #000000;
            transition: background 0.2s, transform 0.1s;
        }

        .arcade-btn.side {
            background-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .arcade-btn.side:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .arcade-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- لوحة النتيجة -->
        <div id="scoreboard">
            السعودية: <span id="score-1">0</span> &nbsp;|&nbsp; البرازيل: <span id="score-2">0</span>
            <div id="turn-status">دوري: شوط</div>
        </div>

        <!-- المرمى والحارس -->
        <div id="goal-net">
            <div id="goalkeeper"></div>
        </div>

        <!-- كرة القدم -->
        <div id="penalty-ball"></div>

        <!-- إشعار القرار المركزي التفاعلي -->
        <div id="arcade-popup">
            <div id="arcade-header">Arcade</div>
            <div id="arcade-title">بلنتياات</div>
            <div id="arcade-message" id="popup-text">اختر زاوية التسديد لتركل الكرة</div>
            
            <div id="popup-buttons">
                <button class="arcade-btn side" onclick="playAction('left')">يسار</button>
                <button class="arcade-btn" onclick="playAction('center')">وسط</button>
                <button class="arcade-btn side" onclick="playAction('right')">يمين</button>
            </div>
        </div>
    </div>

    <script>
        let score1 = 0;
        let score2 = 0;
        let playerShootingTurn = true; 
        let isWaitingForAction = true;

        const ball = document.getElementById('penalty-ball');
        const keeper = document.getElementById('goalkeeper');
        const turnStatus = document.getElementById('turn-status');
        const arcadePopup = document.getElementById('arcade-popup');
        const arcadeMessage = document.getElementById('arcade-message');
        const score1Display = document.getElementById('score-1');
        const score2Display = document.getElementById('score-2');

        const positions = { 'left': '30%', 'center': '50%', 'right': '70%' };
        const ballPositions = { 'left': '38%', 'center': '50%', 'right': '62%' };

        function playAction(playerChoice) {
            if (!isWaitingForAction) return;
            isWaitingForAction = false;

            const options = ['left', 'center', 'right'];
            const aiChoice = options[Math.floor(Math.random() * options.length)];

            let shotLocation = playerShootingTurn ? playerChoice : aiChoice;
            let keeperJump = playerShootingTurn ? aiChoice : playerChoice;

            arcadePopup.style.display = 'none';

            ball.style.bottom = '42%';
            ball.style.left = ballPositions[shotLocation];
            ball.style.width = '25px';
            keeper.style.left = positions[keeperJump];

            setTimeout(() => {
                let isGoal = (shotLocation !== keeperJump);
                let resultText = "";

                if (playerShootingTurn) {
                    if (isGoal) {
                        score1++;
                        resultText = "هدف يا لعيب!";
                    } else {
                        resultText = "معوض يا وحش!";
                    }
                } else {
                    if (isGoal) {
                        score2++;
                        resultText = "هدف للخصم!";
                    } else {
                        resultText = "تصدي كفو!";
                    }
                }

                score1Display.innerText = score1;
                score2Display.innerText = score2;

                setTimeout(() => {
                    playerShootingTurn = !playerShootingTurn;
                    resetPitch();
                    
                    arcadePopup.style.display = 'block';
                    if (playerShootingTurn) {
                        turnStatus.innerText = "دوري: شوط";
                        turnStatus.style.color = "#2ecc71";
                        arcadeMessage.innerHTML = `النتيجة السابقة: ${resultText}<br><br>اختر زاوية التسديد الآن:`;
                    } else {
                        turnStatus.innerText = "دوري: حارس";
                        turnStatus.style.color = "#e74c3c";
                        arcadeMessage.innerHTML = `النتيجة السابقة: ${resultText}<br><br>الخصم سيشوت! اختر اتجاه قفزة الحارس:`;
                    }
                    isWaitingForAction = true;
                }, 2000);

            }, 400);
        }

        function resetPitch() {
            ball.style.transition = 'none';
            ball.style.bottom = '12%';
            ball.style.left = '50%';
            ball.style.width = '50%';
            setTimeout(() => ball.style.transition = 'all 0.4s ease-out', 50);
            keeper.style.left = '50%';
        }
    </script>
</body>
</html>
