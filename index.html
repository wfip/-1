<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي ركلات الجزاء: </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-setup-container {
            width: 800px;
            height: 600px;
            background-image: url('https://i.imgur.com/8Q8oJj6.jpg'); /* صورة ملعب واقعي */
            background-size: cover;
            background-position: center;
            position: relative;
            border: 10px solid #ecf0f1;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* المرمى والحارس */
        #goal-area {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 300px;
            border: 12px solid white;
            border-bottom: none;
            background-color: rgba(0,0,0,0.3);
        }

        #goalkeeper {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: auto;
            content: url('https://i.imgur.com/T0bSg1M.png'); /* صورة حارس حقيقي */
        }

        /* الكرة */
        #penalty-ball {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            content: url('https://i.imgur.com/KzK6M0X.png'); /* صورة كرة واقعية */
        }

        /* لوحة النتائج */
        #result-display {
            position: absolute;
            top: 10px;
            width: 100%;
            font-size: 28px;
            font-weight: bold;
            background-color: rgba(0,0,0,0.6);
            padding: 10px 0;
        }

        /* الإشعار المركزي المنبثق */
        #central-popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.95);
            color: #2c3e50;
            padding: 20px 40px;
            border-radius: 15px;
            border: 5px solid #27ae60;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        #central-popup.failure {
            border-color: #e74c3c;
        }

        /* أزرار اتخاذ القرار */
        #decision-panel {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .decision-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            font-size: 20px;
            padding: 15px 30px;
            margin: 0 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        .decision-btn.save {
            background-color: #e74c3c;
        }

    </style>
</head>
<body>

    <div id="game-setup-container">
        <!-- لوحة النتيجة -->
        <div id="result-display">
            السعودية: <span id="score-team1">0</span> | البرازيل: <span id="score-team2">0</span>
            <br>
            <span id="turn-indicator" style="font-size: 20px; color: #27ae60;">دوري: شوط</span>
        </div>

        <!-- المرمى والحارس -->
        <div id="goal-area">
            <div id="goalkeeper"></div>
        </div>

        <!-- الكرة -->
        <div id="penalty-ball"></div>

        <!-- إشعار القرار في المنتصف -->
        <div id="central-popup">
            <span id="popup-text">هدف يا لعيب!</span>
        </div>

        <!-- أزرار اتخاذ القرار -->
        <div id="decision-panel">
            <button class="decision-btn" onclick="makeDecision('goal')">هددددف!</button>
            <button class="decision-btn save" onclick="makeDecision('save')">تصدي!</button>
        </div>
    </div>

    <script>
        let scoreTeam1 = 0;
        let scoreTeam2 = 0;
        let isShooter = true; // دور الفريق الأول تسديد
        const turnIndicator = document.getElementById('turn-indicator');
        const centralPopup = document.getElementById('central-popup');
        const popupText = document.getElementById('popup-text');

        // وظيفة اتخاذ القرار - أنت صاحب القرار
        function makeDecision(result) {
            let message = "";
            let isSuccess = false;

            // تحديد النتيجة والرسالة بناءً على الزر
            if (isShooter) { // دوري: تسديد
                if (result === 'goal') {
                    scoreTeam1++;
                    message = "هدف يا لعيب!";
                    isSuccess = true;
                } else {
                    message = "معوض يا وحش!";
                    isSuccess = false;
                }
            } else { // دوري: حراسة
                if (result === 'goal') {
                    scoreTeam2++;
                    message = "هدف للخصم!";
                    isSuccess = true;
                } else {
                    message = "تصدي كفو!";
                    isSuccess = false;
                }
            }

            // تحديث السكور فوراً
            document.getElementById('score-team1').innerText = scoreTeam1;
            document.getElementById('score-team2').innerText = scoreTeam2;

            // إظهار الإشعار في منتصف الشاشة
            showPopup(message, isSuccess);

            // تبديل الأدوار بعد الركلة
            isShooter = !isShooter;
            if (isShooter) {
                turnIndicator.innerText = "دوري: شوط";
                turnIndicator.style.color = "#27ae60";
            } else {
                turnIndicator.innerText = "دوري: حارس";
                turnIndicator.style.color = "#e74c3c";
            }
        }

        // وظيفة إظهار وإخفاء النافذة المنبثقة
        function showPopup(text, isSuccess) {
            popupText.innerText = text;
            centralPopup.style.display = 'block';
            if (isSuccess) {
                centralPopup.classList.remove('failure');
            } else {
                centralPopup.classList.add('failure');
            }

            // إخفاء التنبيه تلقائياً بعد ثانيتين
            setTimeout(() => {
                centralPopup.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
