<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة بلنتيات  - منتخبك المفضل</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #4ca1af, #2c3e50);
            margin: 20px auto;
            position: relative;
            border: 10px solid #ecf0f1;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #pitch {
            width: 100%;
            height: 300px;
            background-color: #27ae60;
            position: absolute;
            bottom: 0;
            border-top: 5px solid white;
        }

        #goal {
            width: 400px;
            height: 200px;
            border: 8px solid white;
            border-bottom: none;
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.1);
        }

        #penalty-area {
            width: 600px;
            height: 150px;
            border: 5px solid white;
            border-bottom: none;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        #ball {
            width: 40px;
            height: 40px;
            background-color: white;
            background-image: radial-gradient(circle, #fff 30%, #ccc 70%);
            border-radius: 50%;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: all 0.5s ease-out;
            z-index: 10;
        }

        #goalkeeper {
            width: 60px;
            height: 90px;
            background-color: #e74c3c;
            border-radius: 10px;
            position: absolute;
            top: -95px;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.2s ease-in-out;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            z-index: 5;
        }

        #goalkeeper::after {
            content: '';
            width: 30px;
            height: 30px;
            background-color: #f39c12;
            border-radius: 50%;
            position: absolute;
            top: -35px;
            left: 15px;
        }

        #scoreboard {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0,0,0,0.5);
            padding: 10px 0;
        }

        #setup-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        select, button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        button {
            background-color: #27ae60;
            color: white;
            font-weight: bold;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: none;
            justify-content: center;
        }

        .control-btn {
            background-color: rgba(255, 255, 255, 0.7);
            color: black;
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <!-- شاشة الإعداد -->
        <div id="setup-screen">
            <h1>سوبر بلنتي أركيد</h1>
            <label>اختر منتخبك:</label>
            <select id="player-team">
                <option value="السعودية">السعودية</option>
                <option value="مصر">مصر</option>
                <option value="المغرب">المغرب</option>
                <option value="قطر">قطر</option>
                <option value="الجزائر">الجزائر</option>
            </select>
            <label>اختر الخصم:</label>
            <select id="ai-team">
                <option value="البرازيل">البرازيل</option>
                <option value="الأرجنتين">الأرجنتين</option>
                <option value="فرنسا">فرنسا</option>
                <option value="ألمانيا">ألمانيا</option>
            </select>
            <button onclick="startGame()">ابدأ اللعب</button>
        </div>

        <!-- لوحة النتيجة -->
        <div id="scoreboard">
            <span id="player-score-display">أنت (السعودية): 0</span>
            <span id="turn-display">دوري: شوط</span>
            <span id="ai-score-display">الخصم (البرازيل): 0</span>
        </div>

        <!-- الملعب والمرمى -->
        <div id="pitch">
            <div id="penalty-area"></div>
        </div>
        
        <div id="goal">
            <div id="goalkeeper"></div>
        </div>

        <!-- الكرة -->
        <div id="ball" onclick="playerShoot(event)"></div>

        <!-- أزرار تحكم للحارس -->
        <div id="controls">
            <button class="control-btn" onclick="moveKeeper('left')">يسار</button>
            <button class="control-btn" onclick="moveKeeper('center')">وسط</button>
            <button class="control-btn" onclick="moveKeeper('right')">يمين</button>
        </div>

    </div>

    <script>
        let playerScore = 0;
        let aiScore = 0;
        let rounds = 0;
        let isPlayerShooter = true;
        let playerTeamName = "";
        let aiTeamName = "";
        let gameActive = false;

        const ball = document.getElementById('ball');
        const keeper = document.getElementById('goalkeeper');
        const playerSDisp = document.getElementById('player-score-display');
        const aiSDisp = document.getElementById('ai-score-display');
        const turnDisp = document.getElementById('turn-display');
        const controls = document.getElementById('controls');

        const keeperPositions = {
            'left': '20%',
            'center': '50%',
            'right': '80%'
        };

        function startGame() {
            playerTeamName = document.getElementById('player-team').value;
            aiTeamName = document.getElementById('ai-team').value;

            playerSDisp.innerText = `أنت (${playerTeamName}): 0`;
            aiSDisp.innerText = `الخصم (${aiTeamName}): 0`;
            
            document.getElementById('setup-screen').style.display = 'none';
            gameActive = true;
            resetRound();
        }

        function playerShoot(event) {
            if (!gameActive || !isPlayerShooter) return;

            const shots = ['left', 'center', 'right'];
            const playerShot = shots[Math.floor(Math.random() * shots.length)];
            const aiJump = shots[Math.floor(Math.random() * shots.length)];

            animateShotAndKeeper(playerShot, aiJump);
        }

        function moveKeeper(position) {
            if (!gameActive || isPlayerShooter) return;

            keeper.style.left = keeperPositions[position];

            const shots = ['left', 'center', 'right'];
            const aiShot = shots[Math.floor(Math.random() * shots.length)];
            
            animateShotAndKeeper(aiShot, position);
        }

        function animateShotAndKeeper(shotLocation, keeperJump) {
            gameActive = false;

            ball.style.bottom = '350px';
            ball.style.width = '20px';
            ball.style.height = '20px';
            
            if (shotLocation === 'left') ball.style.left = '35%';
            if (shotLocation === 'center') ball.style.left = '50%';
            if (shotLocation === 'right') ball.style.left = '65%';

            keeper.style.left = keeperPositions[keeperJump];

            setTimeout(() => {
                let isGoal = (shotLocation !== keeperJump);

                if (isPlayerShooter) {
                    if (isGoal) {
                        playerScore++;
                        alert("هدف يا لعيب!");
                    } else {
                        alert("معوض يا وحش!");
                    }
                } else {
                    if (isGoal) {
                        aiScore++;
                        alert(`هدف للخصم (${aiTeamName})`);
                    } else {
                        alert("تصدي كفو!");
                    }
                }

                updateScoreboard();
                switchRoles();
            }, 600);
        }

        function updateScoreboard() {
            playerSDisp.innerText = `أنت (${playerTeamName}): ${playerScore}`;
            aiSDisp.innerText = `الخصم (${aiTeamName}): ${aiScore}`;
        }

        function switchRoles() {
            isPlayerShooter = !isPlayerShooter;
            rounds++;

            if (rounds >= 10) {
                endGame();
                return;
            }

            resetRound();
        }

        function resetRound() {
            gameActive = true;

            ball.style.transition = 'none';
            ball.style.bottom = '60px';
            ball.style.left = '50%';
            ball.style.width = '40px';
            ball.style.height = '40px';
            ball.style.transform = 'translateX(-50%)';
            setTimeout(() => ball.style.transition = 'all 0.5s ease-out', 50);

            keeper.style.left = keeperPositions['center'];

            if (isPlayerShooter) {
                turnDisp.innerText = "دوري: شوط (اضغط الكرة)";
                turnDisp.style.color = "#27ae60";
                ball.style.cursor = 'pointer';
                controls.style.display = 'none';
            } else {
                turnDisp.innerText = "دوري: حارس (اختر اتجاه)";
                turnDisp.style.color = "#e74c3c";
                ball.style.cursor = 'default';
                controls.style.display = 'flex';
            }
        }

        function endGame() {
            gameActive = false;
            turnDisp.innerText = "انتهت المباراة!";
            controls.style.display = 'none';

            let message = "";
            if (playerScore > aiScore) {
                message = `فزت بـ ${playerTeamName} على ${aiTeamName}!`;
            } else if (aiScore > playerScore) {
                message = `خسرت بـ ${playerTeamName} أمام ${aiTeamName}.`;
            } else {
                message = "ما قصرت!";
            }

            alert(`النتيجة النهائية:\nأنت: ${playerScore}\nالخصم: ${aiScore}\n\n${message}`);
            location.reload();
        }
    </script>
</body>
</html>
