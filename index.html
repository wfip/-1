<!DOCTYPE html><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مكسر الصوت الرقمي</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background-color: #121212;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .mixer-card {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .control-group {
      margin: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    label {
      margin-bottom: 8px;
      font-weight: bold;
    }
    input[type="range"] {
      width: 80%;
      cursor: pointer;
    }
    button {
      background-color: #00e676;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }
    button:hover {
      background-color: #00c853;
    }
    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="mixer-card">
    <h2>🎛️ مكسر الصوت الرقمي</h2>
    <button id="startBtn">تشغيل المايكرفون</button>
    <p id="status" class="status">انقر للبدء</p>

    <hr style="border-color: #333; margin: 20px 0;">

    <!-- التحكم في مستوى الصوت -->
    <div class="control-group">
      <label for="volume">مستوى الصوت (Volume)</label>
      <input type="range" id="volume" min="0" max="2" step="0.01" value="1">
    </div>

    <!-- التحكم في الترددات الحادة (Treble) -->
    <div class="control-group">
      <label for="treble">الترددات العالية (Treble)</label>
      <input type="range" id="treble" min="-20" max="20" step="1" value="0">
    </div>

    <!-- التحكم في الترددات المنخفضة (Bass) -->
    <div class="control-group">
      <label for="bass">الترددات المنخفضة (Bass)</label>
      <input type="range" id="bass" min="-20" max="20" step="1" value="0">
    </div>
  </div>

  <script>
    let audioCtx;
    let microphone;
    let gainNode;
    let bassNode;
    let trebleNode;

    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    startBtn.addEventListener('click', async () => {
      if (audioCtx) return; // تم التشغيل مسبقاً

      try {
        // طلب إذن المايكرفون
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // إنشاء معالج الصوت
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        microphone = audioCtx.createMediaStreamSource(stream);
        
        // إنشاء وحدة التحكم في الصوت
        gainNode = audioCtx.createGain();

        // إنشاء فلتر Bass
        bassNode = audioCtx.createBiquadFilter();
        bassNode.type = "lowshelf";
        bassNode.frequency.value = 200;

        // إنشاء فلتر Treble
        trebleNode = audioCtx.createBiquadFilter();
        trebleNode.type = "highshelf";
        trebleNode.frequency.value = 3000;

        // ربط العقد ببعضها (Mic -> Bass -> Treble -> Gain -> Speakers)
        microphone.connect(bassNode);
        bassNode.connect(trebleNode);
        trebleNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        statusText.innerText = "🔴 المايكرفون يعمل الآن";
        statusText.style.color = "#00e676";
        startBtn.disabled = true;
      } catch (err) {
        statusText.innerText = "❌ تعذر الوصول للمايكرفون";
        statusText.style.color = "#ff5252";
      }
    });

    // التحكم في مستوى الصوت
    document.getElementById('volume').addEventListener('input', (e) => {
      if (gainNode) gainNode.gain.value = e.target.value;
    });

    // التحكم في Bass
    document.getElementById('bass').addEventListener('input', (e) => {
      if (bassNode) bassNode.gain.value = e.target.value;
    });

    // التحكم في Treble
    document.getElementById('treble').addEventListener('input', (e) => {
      if (trebleNode) trebleNode.gain.value = e.target.value;
    });
  </script>
</body>
</html>
